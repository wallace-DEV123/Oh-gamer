<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <title>WallaDEV</title>
  
</head>
<body>
  <main class="container">
    <form>
      <h1>Login WallaDEV</h1>
      <div class="input-box">
        <input placeholder="Usuário" type="email">
      </div>

       <div class="input-box">
        <input placeholder="Senha" type="password">
      </div>

      <div class="remember-forgot">
        <label>
         <input type="checkbox">
         Lembre senha
        </label>
        <a href="#">Lembrar senha</a>
      </div>

      <button type="submit" class="login">Login</button>

      <div class="register-link">Não tem duma conta? <a href="#">Crie uma conta</a></div>
    </form>
  </main>
</body>
</html>
